Log notice stdout
CookieAuthentication 1
RunAsDaemon 0
ExitRelay 0
RefuseUnknownExits 0
ClientOnly 1
UseEntryGuards 0

# single SOCKS port — circuit isolation is enforced per SOCKS5 auth credential
SocksPort 127.0.0.1:10000 IsolateSOCKSAuth
ControlPort 127.0.0.1:20000

# circuit rotation
NewCircuitPeriod 30
MaxCircuitDirtiness 300
LearnCircuitBuildTimeout 1
CircuitBuildTimeout 30
MaxClientCircuitsPending 200

# memory tuning
AvoidDiskWrites 1
NumEntryGuards 3
NumDirectoryGuards 3
MaxMemInQueues 256 MB
ConstrainedSockets 1
ConstrainedSockSize 8192
